task_type: hip2hip
source_file_path:
- src/mhc_pre.cu
harness_path: test_mhc_pre_hip_harness.py
compile_command:
- python3 test_mhc_pre_hip_harness.py --correctness
correctness_command:
- python3 test_mhc_pre_hip_harness.py --correctness
performance_command:
- python3 test_mhc_pre_hip_harness.py --full-benchmark
target_kernel_functions:
- mhc_pre_baseline_kernel
- mhc_pre_cuda_launch
prompt:
